<!DOCTYPE html>
<html>
<head>
    <title>Sistema CAIC</title>
</head>
<body>

<h1>📚 Sistema CAIC</h1>

<h2>Adicionar aluno</h2>

<input id="nome" placeholder="Nome">
<input id="turma" placeholder="Turma">
<button onclick="adicionar()">Salvar</button>

<p id="msg"></p>

<h2>Alunos</h2>

<table border="1">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Turma</th>
            <th>Presente</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<script>
async function carregar() {
    const res = await fetch('/api/alunos');
    const dados = await res.json();

    const tabela = document.getElementById('tabela');
    tabela.innerHTML = '';

    const hoje = new Date().toISOString().slice(0,10);

    dados.forEach(a => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${a.nome}</td>
            <td>${a.turma_nome || ''}</td>
            <td>
                <button onclick="marcar(${a.id},1)">✔️</button>
                <button onclick="marcar(${a.id},0)">❌</button>
            </td>
            <td>
                <button onclick="remover(${a.id})">Excluir</button>
            </td>
        `;

        tabela.appendChild(tr);
    });
}

async function adicionar() {
    const nome = document.getElementById('nome').value;
    const turma = document.getElementById('turma').value;

    if (!nome) return alert("Digite o nome");

    await fetch('/api/alunos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: nome, turma_nome: turma })
    });

    document.getElementById('nome').value = '';
    document.getElementById('turma').value = '';
    document.getElementById('msg').textContent = "Aluno salvo ✅";

    carregar();
}

async function remover(id) {
    await fetch('/api/alunos/' + id, { method: 'DELETE' });
    carregar();
}

async function marcar(id, presenca) {
    const hoje = new Date().toISOString().slice(0,10);

    await fetch('/api/frequencia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            aluno_id: id,
            data: hoje,
            presente: presenca
        })
    });

    carregar();
}

// auto load
carregar();
</script>

</body>
</html>
